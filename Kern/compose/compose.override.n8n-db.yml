# Shared database for n8n.

volumes:
  n8n_postgres_storage:

services:
  db:
    image: postgres:${POSTGRES_VERSION:-16}
    container_name: n8n-database
    restart: unless-stopped
    expose:
      - 5432/tcp
    environment:
      POSTGRES_USER: ${N8N_DB_POSTGRESDB_USER:-postgres}
      POSTGRES_PASSWORD: ${N8N_DB_POSTGRESDB_PASSWORD:-postgres}
      POSTGRES_DB: ${N8N_DB_POSTGRESDB_DATABASE:-postgres}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${N8N_DB_POSTGRESDB_USER:-postgres} -d ${N8N_DB_POSTGRESDB_DATABASE:-postgres}
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - n8n_postgres_storage:/var/lib/postgresql/data
