# Flowise service.

volumes:
  flowise_storage:

services:
  flowise:
    image: flowiseai/flowise:latest
    container_name: flowise
    restart: unless-stopped
    expose:
      - 3001/tcp
    environment:
      - PORT=3001
      - FLOWISE_USERNAME=${FLOWISE_USERNAME}
      - FLOWISE_PASSWORD=${FLOWISE_PASSWORD}
    volumes:
      - flowise_storage:/root/.flowise
    entrypoint: /bin/sh
    command:
      - -c
      - sleep 3; flowise start
