# Standalone MinIO service.

volumes:
  minio_data:

services:
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    entrypoint: sh
    command:
      - -c
      - mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data
    expose:
      - 9000/tcp
      - 9001/tcp
    ports:
      - 127.0.0.1:${MINIO_API_PRIVATE_PORT:-9010}:9000
      - 127.0.0.1:${MINIO_CONSOLE_PRIVATE_PORT:-9011}:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        - CMD
        - mc
        - ready
        - local
      interval: 1s
      timeout: 5s
      retries: 5
      start_period: 1s
