# Immich photo and video management.

volumes:
  immich_model_cache:

services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    container_name: immich-server
    restart: unless-stopped
    depends_on:
      - immich-redis
      - immich-postgres
    expose:
      - 2283/tcp
    ports:
      - ${IMMICH_PRIVATE_PORT:-2283}:2283
    environment:
      TZ: ${TZ:-Etc/UTC}
      IMMICH_ENV: ${IMMICH_ENV:-production}
      IMMICH_LOG_LEVEL: ${IMMICH_LOG_LEVEL:-log}
      IMMICH_HOST: ${IMMICH_HOST:-0.0.0.0}
      IMMICH_PORT: ${IMMICH_PORT:-2283}
      DB_HOSTNAME: immich-postgres
      DB_PORT: 5432
      DB_USERNAME: ${IMMICH_DB_USERNAME:-immich}
      DB_PASSWORD: ${IMMICH_DB_PASSWORD}
      DB_DATABASE_NAME: ${IMMICH_DB_DATABASE_NAME:-immich}
      REDIS_HOSTNAME: immich-redis
      REDIS_PORT: 6379
    volumes:
      - ${IMMICH_UPLOAD_LOCATION:-../immich/upload}:/data:Z
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      disable: false

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    container_name: immich-machine-learning
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Etc/UTC}
      IMMICH_ENV: ${IMMICH_ENV:-production}
      IMMICH_LOG_LEVEL: ${IMMICH_LOG_LEVEL:-log}
    volumes:
      - immich_model_cache:/cache
    healthcheck:
      disable: false

  immich-redis:
    image: docker.io/valkey/valkey:9
    container_name: immich-redis
    restart: unless-stopped
    expose:
      - 6379/tcp
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 3s
      timeout: 10s
      retries: 10

  immich-postgres:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich-postgres
    restart: unless-stopped
    shm_size: 128mb
    expose:
      - 5432/tcp
    environment:
      POSTGRES_USER: ${IMMICH_DB_USERNAME:-immich}
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_DB: ${IMMICH_DB_DATABASE_NAME:-immich}
      POSTGRES_INITDB_ARGS: --data-checksums
      DB_STORAGE_TYPE: ${IMMICH_DB_STORAGE_TYPE:-SSD}
    volumes:
      - ${IMMICH_DB_DATA_LOCATION:-../immich/postgres}:/var/lib/postgresql/data:Z
    healthcheck:
      disable: false
