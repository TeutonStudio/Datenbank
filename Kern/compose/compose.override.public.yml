# Public ingress via Caddy.
# Do not combine with compose.override.private.yml.

volumes:
  caddy_data:
  caddy_config:

services:
  caddy:
    image: docker.io/library/caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - ${CADDY_HTTP_PORT:-80}:80/tcp
      - ${CADDY_HTTPS_PORT:-443}:443/tcp
      - ${CADDY_HTTPS_PORT:-443}:443/udp
    expose:
      - 2019/tcp
      - 80/tcp
      - 443/tcp
      - 443/udp
    volumes:
      - ../Caddyfile:/etc/caddy/Caddyfile:ro,Z
      - ../caddy-addon:/etc/caddy/addons:ro,Z
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - N8N_HOSTNAME=${N8N_HOSTNAME:-:8001}
      - WEBUI_HOSTNAME=${WEBUI_HOSTNAME:-:8002}
      - FLOWISE_HOSTNAME=${FLOWISE_HOSTNAME:-:8003}
      - OLLAMA_HOSTNAME=${OLLAMA_HOSTNAME:-:8004}
      - SUPABASE_HOSTNAME=${SUPABASE_HOSTNAME:-:8005}
      - SEARXNG_HOSTNAME=${SEARXNG_HOSTNAME:-:8006}
      - LANGFUSE_HOSTNAME=${LANGFUSE_HOSTNAME:-:8007}
      - NEO4J_HOSTNAME=${NEO4J_HOSTNAME:-:8008}
      - IMMICH_HOSTNAME=${IMMICH_HOSTNAME:-:8009}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-internal}
