# Private Tailscale ingress for Matrix.

volumes:
  matrix_tailscale_state:

services:
  matrix-tailscale:
    image: tailscale/tailscale:${TAILSCALE_VERSION:-latest}
    container_name: matrix-tailscale
    hostname: ${TAILSCALE_HOSTNAME:-selatrix}
    restart: unless-stopped
    ports:
      - 127.0.0.1:${MATRIX_PROXY_PRIVATE_PORT:-8012}:8080
    environment:
      TS_AUTHKEY: ${TAILSCALE_AUTHKEY}
      TS_HOSTNAME: ${TAILSCALE_HOSTNAME:-selatrix}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "true"
      TS_AUTH_ONCE: "true"
      TS_SERVE_CONFIG: /config/serve-config.json
    volumes:
      - matrix_tailscale_state:/var/lib/tailscale
      - ../matrix/tailscale:/config:ro,Z
    healthcheck:
      test:
        - CMD
        - tailscale
        - status
        - --peers=false
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
